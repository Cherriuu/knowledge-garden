<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f7ee;
            font-family: 'Georgia', serif;
        }
 
        .container {
            text-align: center;
            padding: 3rem 2rem;
        }
 
        .emoji {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }
 
        h1 {
            font-size: 2.8rem;
            color: #3a6b35;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }
 
        p {
            font-size: 1.1rem;
            color: #6a8f65;
            max-width: 380px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🌱</span>
        <h1>Knowledge Garden</h1>
        <p>Knowledge Garden helps you keep track of your learning as you watch your garden grow and bloom.</p>
    </div>
</body>
</html>
